apiVersion: v1
kind: Namespace
metadata:
  name: vulnerable-apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: vulnerable-apps
  labels:
    app: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: vulnerable-app
        image: nginx:1.14
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "0"
            memory: "0"
