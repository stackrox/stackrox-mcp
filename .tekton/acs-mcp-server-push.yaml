apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stackrox/stackrox-mcp?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main"
  labels:
    appstudio.openshift.io/application: acs-mcp
    appstudio.openshift.io/component: acs-mcp-server
    pipelines.appstudio.openshift.io/type: build
  name: acs-mcp-server-on-push
  namespace: rh-acs-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image-repo
    value: quay.io/rhacs-eng/release-acs-mcp-server
  - name: dockerfile
    value: konflux.Dockerfile
  - name: hermetic
    value: 'false'
  - name: build-source-image
    value: 'true'
  - name: build-image-index
    value: 'true'
  - name: image-expires-after
    value: '13w'
  - name: clone-depth
    value: '0'
  - name: clone-fetch-tags
    value: 'true'
  - name: build-platforms
    value:
    - linux/amd64
    - linux/arm64
    - linux/ppc64le
    - linux/s390x

  pipelineRef:
    name: basic-component-pipeline

  taskRunTemplate:
    serviceAccountName: build-pipeline-acs-mcp-server

  timeouts:
    tasks: 1h
    finally: 10m
    pipeline: 1h10m

  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
