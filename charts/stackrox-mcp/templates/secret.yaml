{{- if and (eq .Values.config.central.authType "static") (not .Values.config.central.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stackrox-mcp.fullname" . }}-api-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackrox-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.config.central.apiToken }}
  api-token: {{ .Values.config.central.apiToken | b64enc | quote }}
  {{- else }}
  # Empty token - must be set via Helm values or external secret management
  api-token: ""
  {{- end }}
{{- end }}
